<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amogh Shrivastava – Premium Resume</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-page: #f1f5f9;
            --bg-resume: linear-gradient(165deg, #0f172a 0%, #1e293b 100%);
            --accent-primary: #00e5ff;
            --accent-secondary: #d946ef;
            --text-dark: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-premium: 0 20px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 229, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            padding: 4rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* PREMIUM BUTTONS & CONTROLS */
        .admin-trigger {
            position: fixed; top: 25px; right: 25px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            color: white; border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 12px; cursor: pointer;
            font-size: 0.85rem; font-weight: 700; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 900; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .admin-trigger:hover { 
            background: #0f172a; border-color: var(--accent-primary);
            transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .mode-tag {
            position: fixed; bottom: 25px; left: 25px;
            padding: 10px 20px; border-radius: 12px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            font-size: 0.7rem; font-weight: 800; letter-spacing: 0.15em;
            text-transform: uppercase; color: var(--text-muted);
            z-index: 900;
        }

        /* AUTH OVERLAY */
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); display: none;
            justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px);
        }
        .login-card {
            background: rgba(30, 41, 59, 0.5); padding: 3rem; border-radius: 24px;
            border: 1px solid var(--glass-border); text-align: center; width: 420px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* TOOLBARS */
        .editor-toolbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 20px; display: none; gap: 15px;
            z-index: 1000; justify-content: center; align-items: center;
            animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        
        body.edit-mode .editor-toolbar#editorBar { display: flex; }

        .editor-toolbar button {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            padding: 10px 18px; border-radius: 10px; cursor: pointer;
            font-weight: 700; color: white; transition: 0.2s;
            font-family: inherit; font-size: 0.9rem;
        }
        .editor-toolbar button:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-primary); }
        .editor-toolbar button.primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; }
        .editor-toolbar .divider { height: 28px; width: 1px; background: var(--glass-border); margin: 0 10px; }

        /* RESUME CONTAINER */
        .resume-container {
            max-width: 920px; width: 100%;
            background: var(--bg-resume); border-radius: 32px;
            padding: 5rem; border: 1px solid rgba(0, 229, 255, 0.15);
            position: relative; color: var(--text-light);
            box-shadow: var(--shadow-premium);
            transition: all 0.5s ease;
        }

        /* HEADER */
        .header { text-align: center; margin-bottom: 4rem; position: relative; }
        .header h1 { 
            font-size: 3.5rem; font-weight: 800; letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 30%, var(--accent-primary) 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
        }
        .header .subtitle { font-size: 1.25rem; font-weight: 600; color: var(--text-muted); margin-bottom: 1.5rem; }
        .header .contact { display: flex; justify-content: center; gap: 2.5rem; color: var(--text-muted); font-size: 0.95rem; }
        .header .contact span { display: flex; align-items: center; gap: 10px; }
        .header .contact i { color: var(--accent-primary); font-size: 1.1rem; }

        /* SECTIONS */
        .section { margin-bottom: 3.5rem; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .section-title { 
            font-size: 1.1rem; font-weight: 900; color: var(--accent-primary);
            letter-spacing: 0.15em; text-transform: uppercase;
            margin-bottom: 2rem; display: flex; align-items: center; gap: 15px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, rgba(0, 229, 255, 0.3), transparent); }

        .entry { margin-bottom: 2.25rem; }
        .entry-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem; }
        .entry-title { font-weight: 800; font-size: 1.2rem; color: #fff; }
        .entry-date { color: var(--accent-primary); font-weight: 700; font-size: 0.95rem; letter-spacing: 0.05em; }
        .entry-subtitle { color: #cbd5e1; font-weight: 500; font-size: 1rem; margin-top: -0.25rem; margin-bottom: 0.75rem; }

        .bullet-list { list-style: none; }
        .bullet-list li { position: relative; padding-left: 1.75rem; margin-bottom: 0.75rem; color: #94a3b8; line-height: 1.6; font-size: 1rem; }
        .bullet-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent-primary); font-weight: 900; }

        .skills-grid { display: grid; grid-template-columns: 200px 1fr; gap: 2rem; padding: 1rem 0; align-items: start; }
        .skills-grid strong { font-weight: 800; color: #fff; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; margin-top: 8px; }
        .skills-flex { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .skill-tag { 
            background: rgba(0, 229, 255, 0.08); color: var(--accent-primary);
            padding: 8px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 700;
            border: 1px solid rgba(0, 229, 255, 0.2); transition: 0.3s;
        }
        .skill-tag:hover { background: var(--accent-primary); color: #0f172a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.4); }

        /* NOTES PANEL */
        .notes-container { position: fixed; right: 25px; bottom: 25px; width: 320px; display: flex; flex-direction: column; gap: 15px; z-index: 800; }
        .note-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-left: 4px solid var(--accent-primary);
            padding: 18px; border-radius: 16px; font-size: 0.9rem; color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }




        @media print {
            body { padding: 0; background: white; color: black; }
            .editor-toolbar, .mode-tag, .notes-container, .login-overlay, .admin-trigger, #text-toolbar { display: none !important; }
            .resume-container { border: none; box-shadow: none; max-width: 100%; padding: 0; background: white !important; color: black !important; }
            :root { color-scheme: light; }
            .header h1 { -webkit-text-fill-color: black !important; background: none !important; }
            .entry-date, .section-title { color: #0088aa !important; }
            .skill-tag { border: 1px solid #ccc; color: black; background: #eee; }
        }
    </style>

    </style>
</head>

<body>
    <!-- ADMIN ACCESS -->
    <button class="admin-trigger" onclick="showLogin()"><i class="fa-solid fa-lock"></i> Editor Access</button>

    <!-- AUTH OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <h2 style="color: var(--primary); font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em;">ACCESS EDITOR</h2>
            <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem;">Enter password to unlock administrative tools.</p>
            <input type="password" id="passInput" placeholder="••••••••••••" style="width: 100%; padding: 14px; margin-bottom: 1.5rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none;">
            <div style="display: flex; gap: 12px;">
                <button onclick="doLogin()" class="primary" style="flex: 2; padding: 12px; background: linear-gradient(135deg, #00e5ff 0%, #d946ef 100%); border:none; border-radius: 8px; color:white; font-weight:700; cursor:pointer;">Unlock</button>
                <button onclick="hideLogin()" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color:white; cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- TOOLBARS -->
    <div class="editor-toolbar" id="editorBar">
        <button onclick="document.execCommand('bold')"><i class="fa-solid fa-bold"></i></button>
        <button onclick="document.execCommand('italic')"><i class="fa-solid fa-italic"></i></button>
        <div class="divider"></div>
        <button onclick="addSection()"><i class="fa-solid fa-plus"></i> Section</button>
        <button onclick="addEntry()"><i class="fa-solid fa-file-plus"></i> Entry</button>
        <div class="divider"></div>
        <button onclick="downloadData()" class="primary"><i class="fa-solid fa-save"></i> Save JSON</button>
        <button onclick="doLogout()"><i class="fa-solid fa-lock"></i> Exit</button>
    </div>

    <!-- VIEWER INTERACTION -->
    <div id="text-toolbar" style="position: absolute; display: none; background: #1e293b; border: 1px solid rgba(0,229,255,0.2); border-radius: 8px; padding: 6px; gap: 8px; z-index: 500;">
        <button onclick="highlightText()" style="background:transparent; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-highlighter"></i></button>
        <button onclick="makeNote()" style="background:transparent; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-comment-medical"></i></button>
    </div>

    <div class="notes-container" id="notePanel"></div>
    <div class="mode-tag" id="modeIndicator" style="position: fixed; bottom: 20px; left: 20px; color: #94a3b8; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;">Viewer Mode</div>

    <!-- RESUME CONTAINER -->
    <div class="resume-container">
        <div id="app">
            <div style="text-align:center; padding: 10rem 0;">
                <p>Establishing secure connection to resume cloud...</p>
            </div>
        </div>
    </div>

    <script>
        const MASTER_PASS = "amogh-1234_1234#*";
        let data = null;
        let editMode = false;

        async function load() {
            try {
                const res = await fetch('resume.json');
                data = await res.json();
                render();
                renderNotes();
            } catch (e) {
                console.error("Error loading data", e);
            }
        }

        function render() {
            const root = document.getElementById('app');
            let h = `
                <div class="header">
                    <h1 onblur="updateHeader('name', this.innerText)" contenteditable="${editMode}">${data.header.name}</h1>
                    <div class="subtitle" onblur="updateHeader('title', this.innerText)" contenteditable="${editMode}">${data.header.title}</div>
                    <div class="contact">
                        <span onblur="updateHeader('location', this.innerText)" contenteditable="${editMode}"><i class="fa fa-map-marker"></i> ${data.header.location}</span>
                        <span onblur="updateHeader('email', this.innerText)" contenteditable="${editMode}"><i class="fa fa-envelope"></i> ${data.header.email}</span>
                        <span onblur="updateHeader('phone', this.innerText)" contenteditable="${editMode}"><i class="fa fa-phone"></i> ${data.header.phone}</span>
                    </div>
                </div>
            `;

            data.sections.forEach((s, sIdx) => {
                h += `
                    <div class="section" data-idx="${sIdx}">
                        <div class="section-title" onblur="data.sections[${sIdx}].title = this.innerText" contenteditable="${editMode}">${s.title}</div>
                        ${s.entries ? s.entries.map((e, eIdx) => `
                            <div class="entry">
                                <div class="entry-header">
                                    <span class="entry-title" onblur="data.sections[${sIdx}].entries[${eIdx}].organization = this.innerText" contenteditable="${editMode}">${e.organization}</span>
                                    <span class="entry-date" onblur="data.sections[${sIdx}].entries[${eIdx}].date = this.innerText" contenteditable="${editMode}">${e.date}</span>
                                </div>
                                ${e.subtitle !== undefined ? `<div class="entry-subtitle" onblur="data.sections[${sIdx}].entries[${eIdx}].subtitle = this.innerText" contenteditable="${editMode}">${e.subtitle}</div>` : ''}
                                <ul class="bullet-list">
                                    ${e.bullets.map((b, bIdx) => `<li onblur="data.sections[${sIdx}].entries[${eIdx}].bullets[${bIdx}] = this.innerText" contenteditable="${editMode}">${b}</li>`).join('')}
                                </ul>
                            </div>
                        `).join('') : ''}

                        ${s.type === 'skills' ? `
                            <div class="skills-grid">
                                ${s.skillGroups.map((g, gIdx) => `
                                    <strong onblur="data.sections[${sIdx}].skillGroups[${gIdx}].label = this.innerText" contenteditable="${editMode}">${g.label}</strong>
                                    <div class="skills-flex">
                                        ${g.tags.map((t, tIdx) => `<span class="skill-tag" onblur="data.sections[${sIdx}].skillGroups[${gIdx}].tags[${tIdx}] = this.innerText" contenteditable="${editMode}">${t}</span>`).join('')}
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            root.innerHTML = h;
        }

        function updateHeader(key, val) { data.header[key] = val; }

        // EXPOSE TO CONSOLE
        window.unlockEditor = () => { showLogin(); console.log("%c Admin access triggered. Enter password in the overlay.", "color: #00e5ff; font-weight: bold;"); };
        
        function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
        function doLogin() {
            if(document.getElementById('passInput').value === MASTER_PASS) {
                editMode = true;
                document.body.classList.add('edit-mode');
                document.getElementById('modeIndicator').innerText = "Editor Mode";
                document.getElementById('modeIndicator').style.color = "var(--accent-primary)";
                render();
                hideLogin();
            } else { alert("Access Denied"); }
        }

        // Handle Enter key for login
        document.getElementById('passInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        function addSection() {
            data.sections.push({ title: "New Section", entries: [{ organization: "New Organization", date: "Date Range", bullets: ["New Achievement"] }] });
            render();
        }

        function addEntry() {
            // Add to first section for simplicity, or find last entry-based section
            const idx = data.sections.findIndex(s => s.entries);
            if (idx !== -1) {
                data.sections[idx].entries.push({ organization: "New Position", date: "Date Range", bullets: ["Task description"] });
                render();
            }
        }
        function doLogout() {
            editMode = false;
            document.body.classList.remove('edit-mode');
            document.getElementById('modeIndicator').innerText = "Viewer Mode";
            document.getElementById('modeIndicator').style.color = "var(--text-light)";
            render();
        }

        // --- VIEWER INTERACTION ---
        const tool = document.getElementById('text-toolbar');
        let sel = null;
        document.addEventListener('mouseup', e => {
            if(editMode) return;
            const s = window.getSelection();
            if(s.toString().trim()) {
                sel = s.getRangeAt(0);
                tool.style.display = 'flex';
                tool.style.top = (e.pageY - 50) + "px";
                tool.style.left = e.pageX + "px";
            } else tool.style.display = 'none';
        });

        function highlightText() {
            const span = document.createElement('span');
            span.className = 'highlight';
            sel.surroundContents(span);
            tool.style.display = 'none';
        }

        function makeNote() {
            const txt = prompt("Enter Note:");
            if(txt) {
                const notes = JSON.parse(localStorage.getItem('notes') || '[]');
                notes.push({ id: Date.now(), text: txt });
                localStorage.setItem('notes', JSON.stringify(notes));
                renderNotes();
                highlightText();
            }
        }

        function renderNotes() {
            const p = document.getElementById('notePanel');
            const notes = JSON.parse(localStorage.getItem('notes') || '[]');
            p.innerHTML = notes.map(n => `
                <div class="note-card">
                    <i class="fa fa-times delete-note" onclick="delNote(${n.id})"></i>
                    ${n.text}
                </div>
            `).join('');
        }

        function delNote(id) {
            const notes = JSON.parse(localStorage.getItem('notes') || '[]');
            localStorage.setItem('notes', JSON.stringify(notes.filter(n => n.id !== id)));
            renderNotes();
        }

        function downloadData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'resume.json';
            a.click();
        }

        window.onload = load;
    </script>
</body>
</html>
